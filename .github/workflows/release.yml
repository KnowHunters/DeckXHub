name: Release DeckXHub

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: docker.io
  IMAGE_NAME: knowhunters/deckxhub

jobs:
  fetch-upstream-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve latest upstream tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CLAW_TAG=$(gh release view --repo ClawDeckX/ClawDeckX --json tagName --jq .tagName)
          HERMES_TAG=$(gh release view --repo HermesDeckX/HermesDeckX --json tagName --jq .tagName)
          echo "CLAW_TAG=$CLAW_TAG" >> "$GITHUB_ENV"
          echo "HERMES_TAG=$HERMES_TAG" >> "$GITHUB_ENV"
          echo "ClawDeckX latest: $CLAW_TAG"
          echo "HermesDeckX latest: $HERMES_TAG"

      - name: Download ClawDeckX release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p upstream-assets/clawdeckx
          gh release download "$CLAW_TAG" \
            --repo ClawDeckX/ClawDeckX \
            --dir upstream-assets/clawdeckx \
            --pattern "clawdeckx-darwin-amd64" \
            --pattern "clawdeckx-darwin-arm64" \
            --pattern "clawdeckx-linux-amd64" \
            --pattern "clawdeckx-linux-arm64" \
            --pattern "clawdeckx-windows-amd64.exe"
          ls -la upstream-assets/clawdeckx

      - name: Download HermesDeckX release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p upstream-assets/hermesdeckx
          gh release download "$HERMES_TAG" \
            --repo HermesDeckX/HermesDeckX \
            --dir upstream-assets/hermesdeckx \
            --pattern "hermesdeckx-darwin-amd64" \
            --pattern "hermesdeckx-darwin-arm64" \
            --pattern "hermesdeckx-linux-amd64" \
            --pattern "hermesdeckx-linux-arm64" \
            --pattern "hermesdeckx-windows-amd64.exe"
          ls -la upstream-assets/hermesdeckx

      - name: Upload upstream assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: upstream-assets
          path: upstream-assets

  release:
    needs: fetch-upstream-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download upstream assets
        uses: actions/download-artifact@v4
        with:
          name: upstream-assets
          path: upstream-assets

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp upstream-assets/clawdeckx/* release/
          cp upstream-assets/hermesdeckx/* release/
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: fetch-upstream-assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download upstream assets
        uses: actions/download-artifact@v4
        with:
          name: upstream-assets
          path: upstream-assets

      - name: Prepare binaries for Docker build
        run: |
          mkdir -p dist-amd64 dist-arm64
          cp upstream-assets/clawdeckx/clawdeckx-linux-amd64 dist-amd64/clawdeckx
          cp upstream-assets/hermesdeckx/hermesdeckx-linux-amd64 dist-amd64/hermesdeckx
          cp upstream-assets/clawdeckx/clawdeckx-linux-arm64 dist-arm64/clawdeckx
          cp upstream-assets/hermesdeckx/hermesdeckx-linux-arm64 dist-arm64/hermesdeckx
          chmod +x dist-amd64/clawdeckx dist-amd64/hermesdeckx
          chmod +x dist-arm64/clawdeckx dist-arm64/hermesdeckx

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build & push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          build-args: |
            CLAWDECKX_BINARY=dist-amd64/clawdeckx
            HERMESDECKX_BINARY=dist-amd64/hermesdeckx
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}

      - name: Build & push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prebuilt
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-arm64
          build-args: |
            CLAWDECKX_BINARY=dist-arm64/clawdeckx
            HERMESDECKX_BINARY=dist-arm64/hermesdeckx
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_REVISION=${{ github.sha }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}

      - name: Create multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:${TAG} \
            ${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64
          docker buildx imagetools create -t ${{ env.IMAGE_NAME }}:latest \
            ${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            ${{ env.IMAGE_NAME }}:${TAG}-arm64

  smoke-test:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Test ClawDeckX mode
        run: |
          docker run -d --name test-clawdeckx \
            -e INSTALL_MODE=clawdeckx \
            -p 18788:18788 \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          echo "Waiting for ClawDeckX..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:18788/api/v1/health; then
              echo "ClawDeckX is healthy!"
              break
            fi
            sleep 2
          done
          docker logs test-clawdeckx --tail 20
          docker stop test-clawdeckx && docker rm test-clawdeckx

      - name: Test HermesDeckX mode
        run: |
          docker run -d --name test-hermesdeckx \
            -e INSTALL_MODE=hermesdeckx \
            -p 19788:19788 \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          echo "Waiting for HermesDeckX..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:19788/api/v1/health; then
              echo "HermesDeckX is healthy!"
              break
            fi
            sleep 2
          done
          docker logs test-hermesdeckx --tail 20
          docker stop test-hermesdeckx && docker rm test-hermesdeckx

      - name: Test both mode
        run: |
          docker run -d --name test-both \
            -e INSTALL_MODE=both \
            -p 28788:18788 \
            -p 29788:19788 \
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}-amd64
          echo "Waiting for both services..."
          sleep 30
          curl -sf http://localhost:28788/api/v1/health && echo "ClawDeckX OK" || echo "ClawDeckX not ready"
          curl -sf http://localhost:29788/api/v1/health && echo "HermesDeckX OK" || echo "HermesDeckX not ready"
          docker logs test-both --tail 30
          docker stop test-both && docker rm test-both
